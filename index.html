<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pizzas Roy - Cocina</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#CE2B37">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Cocina Roy">
    <link rel="icon" type="image/png" href="icono-pizza.png">
    <link rel="apple-touch-icon" href="icono-pizza.png">
    
    <link rel="stylesheet" href="diseno.css?v=28">
    
    <!-- CLAVE DE SITIO reCAPTCHA v3 -->
    <script src="https://www.google.com/recaptcha/api.js?render=6LcPPFEtAAAAAIVtKgVFo1jtAQWRESDHHnCjMKaE"></script>
    
    <style>
        .whatsapp-local, #whatsapp-box {
            display: none !important;
        }
        .connection-status {
            position: fixed;
            top: 10px;
            right: 10px;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background-color: #4CAF50;
            animation: pulse 2s infinite;
            z-index: 1000;
        }
        .connection-status.disconnected {
            background-color: #f44336;
            animation: pulse-error 1s infinite;
        }
        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(76, 175, 80, 0.7); }
            50% { box-shadow: 0 0 0 5px rgba(76, 175, 80, 0); }
        }
        @keyframes pulse-error {
            0%, 100% { box-shadow: 0 0 0 0 rgba(244, 67, 54, 0.7); }
            50% { box-shadow: 0 0 0 5px rgba(244, 67, 54, 0); }
        }
    </style>
</head>
<body>
    <div class="connection-status" id="connection-status"></div>
    <div class="contenedor">
        <h1>COCINA</h1>
        <div class="contador-box">
            <p>Clientes en espera:</p>
            <span id="actual">...</span>
        </div>
        <button class="boton-accion" id="btn-avisar" disabled>⌛ CONECTANDO...</button>
        <button id="btn-reiniciar" style="margin-top: 30px;">🔄 REINICIAR DÍA</button>
        <div class="slogan-aw">
            <img src="AW.jpg" alt="AW Soluciones Tecnológicas SPA" class="logo-aw">
        </div>
    </div>
    <script src="notifications.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
        import { getDatabase, ref, onValue, set, update, onDisconnect } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-database.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";
        const firebaseConfig = { 
            apiKey: "AIzaSyB9kLWRc6t7_XNBhlC10a4jmtbCntxOEYo", 
            authDomain: "avisador-arayapp.firebaseapp.com", 
            databaseURL: "https://avisador-arayapp-default-rtdb.firebaseio.com", 
            projectId: "avisador-arayapp", 
            storageBucket: "avisador-arayapp.firebasestorage.app", 
            messagingSenderId: "337997002279", 
            appId: "1:337997002279:web:6dc307a6e474432e64c002" 
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);
        let totalEmitidos = 0; 
        let ultimoAvisado = 0;
        let isConnected = false;
        const connectedRef = ref(db, '.info/connected');
        onValue(connectedRef, (snapshot) => {
            isConnected = snapshot.val() === true;
            updateConnectionUI(isConnected);
            if (isConnected) {
                console.log('✅ Conectado a Firebase');
                notificationManager.updateConnectionStatus(true);
            } else {
                console.log('⚠️ Desconectado de Firebase');
                notificationManager.updateConnectionStatus(false);
            }
        });
        function updateConnectionUI(connected) {
            const statusElement = document.getElementById('connection-status');
            if (connected) {
                statusElement.classList.remove('disconnected');
            } else {
                statusElement.classList.add('disconnected');
            }
        }
        signInAnonymously(auth)
            .then(() => {
                console.log('✅ Autenticado anónimamente');
                const btnAvisar = document.getElementById("btn-avisar");
                btnAvisar.disabled = false;
                btnAvisar.innerHTML = "🔔 AVISAR SIGUIENTE";
                onValue(ref(db, 'pizzas_roy/contador_diario'), (snap) => { 
                    totalEmitidos = snap.val() || 0;
                    actualizarPantalla();
                });
                onValue(ref(db, 'pizzas_roy/ultimo_avisado'), (snap) => { 
                    const nuevoAvisado = snap.val() || 0;
                    if (nuevoAvisado > ultimoAvisado) {
                        notificationManager.notifyOrderReady(nuevoAvisado);
                    }
                    ultimoAvisado = nuevoAvisado;
                    actualizarPantalla();
                });
                onDisconnect(ref(db, 'pizzas_roy/estado')).set('desconectado');
                set(ref(db, 'pizzas_roy/estado'), 'conectado');
            })
            .catch((error) => {
                console.error('❌ Error de autenticación:', error);
                document.getElementById("btn-avisar").innerText = "❌ ERROR DE CONEXIÓN";
                notificationManager.notifyError('No se pudo conectar a Firebase');
            });
        function actualizarPantalla() {
            let enEspera = totalEmitidos - ultimoAvisado;
            document.getElementById("actual").innerText = enEspera < 0 ? 0 : enEspera;
        }
        document.getElementById("btn-avisar").addEventListener("click", async () => {
            if (ultimoAvisado < totalEmitidos) {
                let siguiente = ultimoAvisado + 1;
                try {
                    await set(ref(db, 'pizzas_roy/pedidos/' + siguiente + '/estado'), "LISTO");
                    await set(ref(db, 'pizzas_roy/ultimo_avisado'), siguiente);
                    notificationManager.notifySuccess(`Pedido #${siguiente} marcado como listo`);
                } catch (error) {
                    notificationManager.notifyError('Error al marcar pedido');
                }
            } else { 
                notificationManager.notifyError('Todos los clientes ya fueron avisados');
            }
        });
        document.getElementById("btn-reiniciar").addEventListener("click", () => {
            if(confirm("¿Reiniciar el sistema para un nuevo día?")) {
                const updates = {};
                updates['pizzas_roy/contador_diario'] = 0;
                updates['pizzas_roy/ultimo_avisado'] = 0;
                updates['pizzas_roy/pedidos'] = null;
                updates['pizzas_roy/reinicio_global'] = Date.now();
                update(ref(db), updates)
                    .then(() => {
                        totalEmitidos = 0;
                        ultimoAvisado = 0;
                        actualizarPantalla();
                        notificationManager.notifySuccess('Sistema reiniciado para nuevo día');
                    })
                    .catch(error => {
                        notificationManager.notifyError('Error al reiniciar');
                    });
            }
        });
    </script>
</body>
</html>
